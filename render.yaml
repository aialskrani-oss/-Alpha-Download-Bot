services:
    - type: web
      name: alpha-downloader-bot
      runtime: docker
      rootDir: .
      dockerfilePath: ./Dockerfile
      healthCheckPath: /health
      envVars:
        - key: TELEGRAM_BOT_TOKEN
          sync: false
        - key: FACEBOOK_COOKIES
          sync: false
        - key: RENDER_EXTERNAL_URL
          value: https://alpha-download-bot.onrender.com
      autoDeploy: true
  