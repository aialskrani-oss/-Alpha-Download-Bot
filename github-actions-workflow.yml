# GitHub Actions — Alpha Downloader Bot
  # يبني Docker image ويرفعه إلى GitHub Container Registry (ghcr.io)
  # Builds Docker image and pushes to GitHub Container Registry (ghcr.io)
  #
  # للتفعيل: انسخ هذا الملف إلى .github/workflows/docker-publish.yml
  # To enable: copy this file to .github/workflows/docker-publish.yml

  name: Build & Push Docker Image

  on:
    push:
      branches: [main, master]
    pull_request:
      branches: [main, master]

  env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

  jobs:
    # --- وظيفة 1: التحقق من صحة الكود / Job 1: Syntax check ---
    syntax-check:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11"

        - name: Install dependencies
          run: pip install -r requirements.txt

        - name: Check syntax
          run: |
            python -m py_compile main.py
            python -m py_compile keep_alive.py
            echo "✅ No syntax errors found"

    # --- وظيفة 2: بناء ورفع Docker image / Job 2: Build & push Docker image ---
    build-and-push:
      runs-on: ubuntu-latest
      needs: syntax-check
      # فقط عند push إلى main/master (وليس Pull Requests)
      # Only on push to main/master, not PRs
      if: github.event_name == 'push'
      permissions:
        contents: read
        packages: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Log in to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Extract Docker metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            tags: |
              type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
              type=sha,prefix=sha-

        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
  