# GitHub Actions Workflow

To enable CI, add this file to `.github/workflows/deploy.yml`
(requires a token with `workflow` scope to create via API)

---

name: Check Bot Syntax

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd telegram-bot
          pip install -r requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile telegram-bot/main.py
          python -m py_compile telegram-bot/keep_alive.py
          echo "✅ No syntax errors found"
